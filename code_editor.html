<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NebuliOS Code Editor</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

    <style>
        :root {
            --bg: #0e0114;
            --panel: rgba(255,255,255,0.03);
            --border-color: rgba(255,255,255,0.08);
            --gold: #d4af37;
            --violet: #8A2BE2;
            --text-main: #f5e8ff;
            --text-dim: rgba(245,232,255,0.55);
            --accent: #d4af37;
            --editor-bg: #0e0114;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, rgba(212,175,55,0.22), rgba(138,43,226,0.12)); 
            border-radius: 4px; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(1200px 800px at 10% 10%, rgba(138,43,226,0.06), transparent),
                        radial-gradient(1000px 600px at 90% 80%, rgba(212,175,55,0.02), transparent),
                        var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        .explorer {
            width: 260px;
            background: rgba(0,0,0,0.2);
            border-right: 1px solid var(--border-color);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), margin-left 0.3s;
            z-index: 20;
        }

        .explorer.collapsed {
            width: 0;
            margin-left: -1px;
            overflow: hidden;
            border-right: none;
        }

        .explorer-header {
            padding: 16px 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            white-space: nowrap;
        }

        .explorer-footer {
            padding: 10px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-start;
        }

        .collapse-btn {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            color: var(--text-dim);
        }
        .collapse-btn:hover { opacity: 1; color: var(--gold); }

        .reopen-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 32px;
            height: 32px;
            background: var(--violet);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            box-shadow: 0 0 15px rgba(138,43,226,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .add-project-btn {
            cursor: pointer;
            color: var(--gold);
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .add-project-btn:hover { opacity: 1; }

        .explorer-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .project-item {
            user-select: none;
        }

        .project-row {
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .project-row:hover { background: rgba(255,255,255,0.05); }

        .project-row .controls, .file-item .controls {
            margin-left: auto;
            display: none;
            gap: 8px;
        }
        .project-row:hover .controls, .file-item:hover .controls { display: flex; }

        .control-icon { opacity: 0.6; transition: opacity 0.2s; }
        .control-icon:hover { opacity: 1; color: #ff4d4d; }

        .file-item {
            padding: 6px 20px 6px 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .file-item:hover { background: rgba(255,255,255,0.05); }

        .editor-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: rgba(0,0,0,0.1);
        }

        .tabs-container {
            display: flex;
            background: linear-gradient(90deg, rgba(138,43,226,0.08), rgba(212,175,55,0.04));
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        .tab {
            padding: 10px 15px;
            font-size: 12px;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tab.active {
            background: rgba(255,255,255,0.05);
            color: var(--gold);
            box-shadow: inset 0 -2px 0 var(--gold);
        }

        .close-tab {
            padding: 2px;
            border-radius: 4px;
            opacity: 0.5;
        }
        .close-tab:hover {
            background: rgba(255,255,255,0.1);
            opacity: 1;
        }

        .code-entry {
            flex: 1;
            position: relative;
            background: var(--editor-bg);
            overflow: hidden;
        }

        #editing, #highlighting {
            margin: 0;
            padding: 20px;
            border: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            tab-size: 4;
            white-space: pre;
            word-wrap: normal;
            overflow: auto;
        }

        #editing {
            z-index: 1;
            background: transparent;
            color: transparent;
            caret-color: white;
            resize: none;
            outline: none;
            -webkit-text-fill-color: transparent;
        }

        #highlighting {
            z-index: 0;
            pointer-events: none;
            background: var(--editor-bg);
        }

        #highlighting-content {
            font-family: inherit !important;
            font-size: inherit !important;
            line-height: inherit !important;
            display: block;
        }

        .no-edit-msg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--editor-bg);
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .no-edit-msg p { color: var(--text-dim); font-size: 14px; max-width: 300px; }

        .mover-bar {
            width: 4px;
            cursor: col-resize;
            background: var(--border-color);
            transition: background 0.2s, width 0.2s;
            flex-shrink: 0;
            z-index: 5;
        }
        .mover-bar:hover, .mover-bar.active {
            background: var(--violet);
            width: 6px;
        }

        .preview-pane {
            width: 35%;
            background: white;
            border-left: 1px solid var(--border-color);
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .preview-pane.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100%;
            z-index: 200;
        }

        .preview-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 5px;
        }

        .preview-btn {
            background: rgba(14, 1, 20, 0.8);
            border: 1px solid var(--border-color);
            color: var(--gold);
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .preview-btn:hover {
            background: var(--violet);
            color: white;
        }

        iframe { width: 100%; height: 100%; border: none; background: white; }

        .hljs { background: transparent !important; padding: 0 !important; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: var(--bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
            width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .modal h3 { color: var(--gold); margin-bottom: 20px; }

        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-option {
            flex: 1;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            background: rgba(255,255,255,0.03);
            font-size: 13px;
        }
        .type-option.selected {
            border-color: var(--violet);
            background: rgba(138,43,226,0.1);
            color: var(--violet);
        }

        .modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
            outline: none;
        }

        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; }
        .modal-btn { padding: 10px 20px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; }
        .modal-btn.primary { background: var(--violet); color: white; }
        .modal-btn.secondary { background: transparent; color: var(--text-dim); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="reopen-explorer" class="reopen-btn" onclick="toggleExplorer(false)">
        <i data-lucide="sidebar" size="18" style="color: white"></i>
    </div>

    <aside class="explorer" id="main-explorer">
        <div class="explorer-header">
            Explorer
            <i data-lucide="folder-plus" class="add-project-btn" size="16" onclick="showProjectModal()"></i>
        </div>
        <div class="explorer-content" id="explorer-list"></div>
        <div class="explorer-footer">
            <i data-lucide="sidebar" class="collapse-btn" size="18" onclick="toggleExplorer(true)"></i>
        </div>
    </aside>

    <div class="editor-workspace" id="editor-side">
        <div class="tabs-container" id="tabs-bar"></div>
        <div class="code-entry">
            <div id="no-file-message" class="no-edit-msg">
                <i data-lucide="code-2" size="48" style="color: var(--violet); margin-bottom: 15px; opacity: 0.3;"></i>
                <p>You cannot edit this file, select a file or create a new project to start editing</p>
            </div>
            <textarea id="editing" spellcheck="false" oninput="updateAll()" onscroll="syncScroll()"></textarea>
            <pre id="highlighting" aria-hidden="true"><code id="highlighting-content"></code></pre>
        </div>
    </div>

    <div class="mover-bar" id="resizer"></div>

    <section class="preview-pane" id="preview-side">
        <div class="preview-controls">
            <button class="preview-btn" onclick="toggleFullscreen()" id="fs-toggle">
                <i data-lucide="maximize" size="16"></i>
            </button>
        </div>
        <iframe id="preview-window"></iframe>
    </section>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal" id="project-modal">
            <h3>Create New Project</h3>
            <div class="type-selector">
                <div class="type-option selected" onclick="selectType('html', this)">HTML Project</div>
                <div class="type-option" onclick="selectType('python', this)">Python Project</div>
                <div class="type-option" onclick="selectType('blank', this)">Blank Project</div>
            </div>
            <input type="text" id="project-name" placeholder="Project Name">
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="handleCreateProject()">Create</button>
            </div>
        </div>
    </div>

    <script>
        let fileSystem = {};
        let selectedProjectType = 'html';
        const readmeFile = {
            name: 'README.md',
            content: `<!DOCTYPE html><html><head><style>body { font-family: sans-serif; background: #0e0114; color: #f5e8ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; text-align: center; padding: 20px; } h1 { color: #d4af37; margin-bottom: 10px; } p { color: rgba(245,232,255,0.7); max-width: 400px; line-height: 1.6; } .accent { color: #8A2BE2; font-weight: bold; }</style></head><body><h1>Welcome to the NebuliOS code editor</h1><p>Get started by adding a project in the <span class="accent">"explorer"</span> section on the left of the screen.</p></body></html>`
        };

        let openTabs = [];
        let activeTabPath = null;
        let collapsedFolders = new Set();

        const editArea = document.getElementById('editing');
        const viewArea = document.getElementById('highlighting-content');
        const viewContainer = document.getElementById('highlighting');
        const previewWindow = document.getElementById('preview-window');
        const noFileMessage = document.getElementById('no-file-message');
        const previewPane = document.getElementById('preview-side');
        const resizer = document.getElementById('resizer');
        const explorer = document.getElementById('main-explorer');
        const reopenBtn = document.getElementById('reopen-explorer');

        function toggleExplorer(collapsed) {
            if (collapsed) {
                explorer.classList.add('collapsed');
                reopenBtn.style.display = 'flex';
            } else {
                explorer.classList.remove('collapsed');
                reopenBtn.style.display = 'none';
            }
        }

        function toggleFullscreen() {
            const isFullscreen = previewPane.classList.toggle('fullscreen');
            const icon = document.getElementById('fs-toggle');
            icon.innerHTML = isFullscreen ? '<i data-lucide="minimize" size="16"></i>' : '<i data-lucide="maximize" size="16"></i>';
            lucide.createIcons();
        }

        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            resizer.classList.add('active');
            document.body.style.cursor = 'col-resize';
            previewPane.style.pointerEvents = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = document.body.offsetWidth;
            const explorerWidth = explorer.classList.contains('collapsed') ? 0 : explorer.offsetWidth;
            const availableWidth = containerWidth - explorerWidth;
            const mouseRelativeX = e.clientX - explorerWidth;
            const percentage = (1 - (mouseRelativeX / availableWidth)) * 100;
            
            if (percentage > 5 && percentage < 90) {
                previewPane.style.width = percentage + '%';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('active');
                document.body.style.cursor = 'default';
                previewPane.style.pointerEvents = 'auto';
            }
        });

        function loadFS() {
            const data = localStorage.getItem('vfs_file_manager_data');
            if (data) { fileSystem = JSON.parse(data); } 
            else {
                fileSystem = { 'SystemRoot': { type: 'folder', children: { 'Home': { type: 'folder', children: { 'Documents': { type: 'folder', children: {} }, 'Code_Projects': { type: 'folder', children: {} }, 'Media': { type: 'folder', children: {} } } } } } };
                saveFS();
            }
        }

        function saveFS() { localStorage.setItem('vfs_file_manager_data', JSON.stringify(fileSystem)); }
        function getCodeProjectsNode() { return fileSystem['SystemRoot'].children['Home'].children['Code_Projects'].children; }

        function showProjectModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function selectType(type, el) {
            selectedProjectType = type;
            document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        function handleCreateProject() {
            const name = document.getElementById('project-name').value.trim();
            if (!name) return;
            const projects = getCodeProjectsNode();
            projects[name] = { type: 'folder', children: {} };
            if (selectedProjectType === 'html') {
                projects[name].children['index.html'] = { type: 'file', content: '<!DOCTYPE html>\n<html>\n<head>\n  <link rel="stylesheet" href="style.css">\n</head>\n<body>\n  <h1>New HTML Project</h1>\n  <script src="script.js"><\/script>\n</body>\n</html>', mime: 'text/html' };
                projects[name].children['style.css'] = { type: 'file', content: 'body { background: #1a1a1a; color: white; font-family: sans-serif; }', mime: 'text/css' };
                projects[name].children['script.js'] = { type: 'file', content: 'console.log("Project Loaded");', mime: 'text/javascript' };
            } else if (selectedProjectType === 'python') {
                projects[name].children['main.py'] = { type: 'file', content: 'name = input("What is your name? ")\nprint("Hello, " + name + "!")', mime: 'text/x-python' };
            }
            saveFS(); renderExplorer(); closeModal();
        }

        function addFileToProject(projectName) {
            const fileName = prompt("Enter file name (e.g. app.js):");
            if (!fileName) return;
            const projects = getCodeProjectsNode();
            projects[projectName].children[fileName] = { type: 'file', content: '', mime: 'text/plain' };
            saveFS(); renderExplorer();
        }

        function deleteProject(projectName) {
            if (!confirm(`Delete project "${projectName}"?`)) return;
            const projects = getCodeProjectsNode();
            delete projects[projectName];
            openTabs = openTabs.filter(t => t.projName !== projectName);
            if (activeTabPath && activeTabPath.startsWith(projectName + '/')) activeTabPath = null;
            saveFS(); renderExplorer(); renderTabs(); updateAll();
        }

        function deleteFile(projName, fileName) {
            if (!confirm(`Delete file "${fileName}"?`)) return;
            const projects = getCodeProjectsNode();
            delete projects[projName].children[fileName];
            const path = `${projName}/${fileName}`;
            openTabs = openTabs.filter(t => t.path !== path);
            if (activeTabPath === path) activeTabPath = openTabs.length > 0 ? openTabs[openTabs.length - 1].path : null;
            saveFS(); renderExplorer(); renderTabs(); updateAll();
        }

        function toggleFolder(name) {
            if (collapsedFolders.has(name)) collapsedFolders.delete(name);
            else collapsedFolders.add(name);
            renderExplorer();
        }

        function renderExplorer() {
            const list = document.getElementById('explorer-list');
            const projects = getCodeProjectsNode();
            let html = '';
            for (const [projName, projData] of Object.entries(projects)) {
                const isCollapsed = collapsedFolders.has(projName);
                html += `
                    <div class="project-item">
                        <div class="project-row" onclick="toggleFolder('${projName}')">
                            <i data-lucide="${isCollapsed ? 'chevron-right' : 'chevron-down'}" size="14"></i>
                            <i data-lucide="folder" size="14" style="color: var(--violet)"></i>
                            <span>${projName}</span>
                            <div class="controls">
                                <i data-lucide="file-plus" class="control-icon" size="14" onclick="event.stopPropagation(); addFileToProject('${projName}')"></i>
                                <i data-lucide="trash-2" class="control-icon" size="14" onclick="event.stopPropagation(); deleteProject('${projName}')"></i>
                            </div>
                        </div>
                        <div class="${isCollapsed ? 'hidden' : ''}">
                            ${Object.keys(projData.children).map(fileName => `
                                <div class="file-item" onclick="openFile('${projName}', '${fileName}')">
                                    <i data-lucide="file" size="14" style="color: var(--gold)"></i>
                                    <span>${fileName}</span>
                                    <div class="controls">
                                        <i data-lucide="trash-2" class="control-icon" size="14" onclick="event.stopPropagation(); deleteFile('${projName}', '${fileName}')"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
            list.innerHTML = html; lucide.createIcons();
        }

        function openFile(projName, fileName) {
            const path = `${projName}/${fileName}`;
            if (!openTabs.find(t => t.path === path)) openTabs.push({ projName, fileName, path });
            activeTabPath = path;
            const projects = getCodeProjectsNode();
            editArea.value = projects[projName].children[fileName].content;
            renderTabs(); updateAll();
        }

        function closeTab(e, path) {
            e.stopPropagation();
            openTabs = openTabs.filter(t => t.path !== path);
            if (activeTabPath === path) {
                activeTabPath = openTabs.length > 0 ? openTabs[openTabs.length - 1].path : null;
                if(activeTabPath) {
                   const nextTab = openTabs.find(t => t.path === activeTabPath);
                   const projects = getCodeProjectsNode();
                   editArea.value = projects[nextTab.projName].children[nextTab.fileName].content;
                }
            }
            renderTabs(); updateAll();
        }

        function renderTabs() {
            const bar = document.getElementById('tabs-bar');
            bar.innerHTML = openTabs.map(t => `
                <div class="tab ${t.path === activeTabPath ? 'active' : ''}" onclick="switchTab('${t.path}')">
                    <i data-lucide="file" size="12"></i>
                    ${t.fileName}
                    <i data-lucide="x" class="close-tab" size="12" onclick="closeTab(event, '${t.path}')"></i>
                </div>`).join('');
            lucide.createIcons();
        }

        function switchTab(path) { 
            activeTabPath = path;
            const tab = openTabs.find(t => t.path === activeTabPath);
            const projects = getCodeProjectsNode();
            editArea.value = projects[tab.projName].children[tab.fileName].content;
            renderTabs(); 
            updateAll(); 
        }

        function updateAll() {
            if (activeTabPath) {
                noFileMessage.style.display = 'none';
                const tab = openTabs.find(t => t.path === activeTabPath);
                const projects = getCodeProjectsNode();
                
                projects[tab.projName].children[tab.fileName].content = editArea.value;
                saveFS();

                let code = editArea.value;
                if(code[code.length-1] === "\n") code += " ";
                viewArea.textContent = code;
                const ext = tab.fileName.split('.').pop();
                const langMap = { 'html': 'xml', 'js': 'javascript', 'css': 'css', 'py': 'python' };
                viewArea.className = `language-${langMap[ext] || 'plaintext'}`;
                hljs.highlightElement(viewArea);

                const currentProj = projects[tab.projName].children;
                if (currentProj['index.html']) {
                    let combined = currentProj['index.html'].content || '';
                    const css = `<style>${currentProj['style.css']?.content || ''}</style>`;
                    const js = `<script>${currentProj['script.js']?.content || ''}<\/script>`;
                    combined = combined.includes('head') ? combined.replace('</head>', `${css}</head>`) : css + combined;
                    combined = combined.includes('body') ? combined.replace('</body>', `${js}</body>`) : combined + js;
                    previewWindow.src = URL.createObjectURL(new Blob([combined], { type: 'text/html' }));
                } else if (ext === 'py') {
                    runPython(editArea.value);
                }
            } else {
                noFileMessage.style.display = 'flex';
                viewArea.textContent = ""; editArea.value = "";
                previewWindow.src = URL.createObjectURL(new Blob([readmeFile.content], { type: 'text/html' }));
            }
        }

        function runPython(code) {
            const terminalBase = `<!DOCTYPE html><html><head><style>
                body { background: #0c0012; color: #00ff00; font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 20px; line-height: 1.5; margin:0; height:100vh; display:flex; flex-direction:column; overflow:hidden; } 
                #console { flex:1; overflow-y:auto; white-space:pre-wrap; } 
                #input-container { display:none; align-items:center; }
                #prompt-text { color: #00ff00; margin-right: 5px; }
                #user-input { background:transparent; border:none; color:#00ff00; font-family:inherit; font-size:inherit; outline:none; flex:1; }
                .error { color: #ff5555; }
            </style></head><body>
                <div id="console"></div>
                <div id="input-container"><span id="prompt-text"></span><input type="text" id="user-input" autocomplete="off"></div>
            </body></html>`;
            
            const blob = new Blob([terminalBase], { type: 'text/html' });
            previewWindow.src = URL.createObjectURL(blob);

            previewWindow.onload = () => {
                const doc = previewWindow.contentDocument;
                const consoleDiv = doc.getElementById('console');
                const inputContainer = doc.getElementById('input-container');
                const promptSpan = doc.getElementById('prompt-text');
                const userInput = doc.getElementById('user-input');
                
                const outFunc = (text) => {
                    const span = doc.createElement('span');
                    span.textContent = text;
                    consoleDiv.appendChild(span);
                    consoleDiv.scrollTop = consoleDiv.scrollHeight;
                };

                const inputFunc = (promptText) => {
                    return new Promise((resolve) => {
                        promptSpan.textContent = promptText;
                        inputContainer.style.display = 'flex';
                        userInput.value = '';
                        userInput.focus();
                        
                        const handleKey = (e) => {
                            if (e.key === 'Enter') {
                                const val = userInput.value;
                                inputContainer.style.display = 'none';
                                userInput.removeEventListener('keydown', handleKey);
                                outFunc(promptText + val + '\n');
                                resolve(val);
                            }
                        };
                        userInput.addEventListener('keydown', handleKey);
                    });
                };

                const pyAlert = new Sk.builtin.func(function(msg) {
                    outFunc(Sk.ffi.remapToJs(msg) + "\n");
                    return Sk.builtin.none.none$;
                });

                Sk.configure({
                    output: outFunc,
                    inputfun: inputFunc,
                    inputfunTakesPrompt: true,
                    read: (x) => {
                        if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
                            throw "File not found: '" + x + "'";
                        return Sk.builtinFiles["files"][x];
                    }
                });

                const mainMod = Sk.importMainWithBody("<stdin>", false, code, true);
                mainMod.tp$setattr('alert', pyAlert);

                Sk.misceval.asyncToPromise(() => {
                    return mainMod;
                }).then(() => {}, (err) => {
                    const errSpan = doc.createElement('span');
                    errSpan.className = 'error';
                    errSpan.textContent = "\n" + err.toString();
                    consoleDiv.appendChild(errSpan);
                });
            };
        }

        function syncScroll() { viewContainer.scrollTop = editArea.scrollTop; viewContainer.scrollLeft = editArea.scrollLeft; }

        editArea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                let start = this.selectionStart;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(this.selectionEnd);
                this.selectionStart = this.selectionEnd = start + 4;
                updateAll();
            }
        });

        loadFS(); renderExplorer(); updateAll();
    </script>
</body>
</html>
