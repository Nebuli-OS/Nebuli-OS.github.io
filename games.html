<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebuliOS | Games</title>
<style>
:root {
    --bg: #0e0114;
    --accent: #d4af37;
    --text: #f5e8ff;
    --input-bg: #160a22;
    --border: rgba(255,255,255,0.1);
    --sub-text: rgba(245,232,255,0.55);
    --gold: #d4af37;
    --panel: rgba(255,255,255,0.03);
    --glass: rgba(255,255,255,0.04);
    --gold-dim: rgba(212,175,55,0.18);
    --violet: #8A2BE2;
    --muted: rgba(245,232,255,0.55);
    --shadow: 0 8px 30px rgba(0,0,0,0.6);
    --modal-bg: #160a22;
}

::-webkit-scrollbar {
  width: 12px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #ffd600, #9c27b0, #ffd600);
  background-attachment: fixed;
  border-radius: 10px;
}

::-webkit-scrollbar-corner {
  background: transparent;
}

body {
    background: radial-gradient(1200px 800px at 10% 10%, rgba(138,43,226,0.06), transparent),
                radial-gradient(1000px 600px at 90% 80%, rgba(212,175,55,0.02), transparent),
                var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

#backdrop {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.3;
    transition: background 1s ease;
}

.container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5vh 40px 0;
    width: 100%;
    box-sizing: border-box;
    overflow-y: auto;
    z-index: 10;
}

.search-area {
    width: 100%;
    max-width: 600px;
    margin: 0 auto 30px;
    display: flex;
    gap: 12px;
    position: relative;
}

.dropdown {
    position: relative;
    width: 160px;
    flex-shrink: 0;
}

.dropdown-btn {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 14px 20px;
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
    transition: all 0.3s;
}

.dropdown-btn:hover {
    border-color: var(--accent);
}

.dropdown-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    transition: transform 0.25s;
}

.dropdown.open .dropdown-btn svg {
    transform: rotate(180deg);
}

.dropdown-menu {
    position: absolute;
    top: 110%;
    left: 0;
    width: 100%;
    background: #160a22;
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-5px);
    transition: .25s;
    z-index: 1000;
}

.dropdown.open .dropdown-menu {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
}

.dropdown-item {
    padding: 12px 20px;
    cursor: pointer;
    color: var(--sub-text);
    font-size: 0.95rem;
    transition: background 0.2s, color 0.2s;
}

.dropdown-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
}

.search-input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    padding: 14px 20px;
    border-radius: 30px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: all 0.3s;
    box-sizing: border-box;
}

.search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

.games-wrapper {
    width: 100%;
    padding-bottom: 60px;
}

h2 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-top: 35px;
    margin-bottom: 15px;
    color: var(--accent);
    letter-spacing: 0.5px;
}

.divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent), transparent);
    margin: 30px 0;
}

.games-section {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    grid-gap: 20px;
    width: 100%;
}

.game {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 10px;
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
}

.game:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--accent);
    box-shadow: 0 8px 25px rgba(214,175,55,0.15), var(--shadow);
}

.game img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    opacity: .85;
    transition: opacity 0.25s;
}

.game:hover img {
    opacity: 0.95;
}

.game a {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
    font-size: 0.9rem;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    z-index: 2;
    background: rgba(0,0,0,0.2);
    transition: background 0.25s;
    padding: 10px;
    box-sizing: border-box;
    text-align: center;
}

.game a:hover {
    background: rgba(0,0,0,0.45);
}
</style>
</head>
<body>

<div id="backdrop"></div>

<div class="container">
    <div class="search-area">
        <div class="dropdown" id="dropdown">
            <div class="dropdown-btn" id="dropdownBtn">
                <span id="dropdownLabel">UGS</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </div>
            <div class="dropdown-menu">
                <div class="dropdown-item">UGS</div>
                <div class="dropdown-item">gn-ports</div>
            </div>
        </div>
        <input id="search" class="search-input" placeholder="Search for a game...">
    </div>

    <div class="games-wrapper" id="games-container"></div>
</div>

<script>
const dropdown = document.getElementById("dropdown")
const dropdownBtn = document.getElementById("dropdownBtn")
const dropdownLabel = document.getElementById("dropdownLabel")

let selectedCategory = "UGS"
let gamesData = null

dropdownBtn.onclick = () => dropdown.classList.toggle("open")

document.querySelectorAll(".dropdown-item").forEach(item => {
    item.onclick = () => {
        dropdownLabel.textContent = item.textContent
        selectedCategory = item.textContent
        dropdown.classList.remove("open")
        renderGames()
    }
})

document.addEventListener("click", e => {
    if (!dropdown.contains(e.target)) dropdown.classList.remove("open")
})

async function loadGames() {
    const res = await fetch("/assets/game/games.json")
    gamesData = await res.json()
    renderGames()
}

function renderGames() {
    const container = document.getElementById("games-container")
    container.innerHTML = ""

    if (gamesData["Uncategorized"]) {
        const section = document.createElement("div")
        section.className = "games-section"

        gamesData["Uncategorized"].forEach(game => {
            const div = document.createElement("div")
            div.className = "game"
            div.innerHTML = `
                <img src="${game.image}" alt="${game.alt}">
                <a href="${game.href}">${game.title}</a>
            `
            section.appendChild(div)
        })

        container.appendChild(section)
        container.appendChild(createDivider())
    }

    displayRecent()

    if (gamesData[selectedCategory]) {
        const title = document.createElement("h2")
        title.textContent = selectedCategory

        const section = document.createElement("div")
        section.className = "games-section"

        gamesData[selectedCategory].forEach(game => {
            const div = document.createElement("div")
            div.className = "game"
            div.innerHTML = `
                <img src="${game.image}">
                <a href="${game.href}">${game.title}</a>
            `
            section.appendChild(div)
        })

        container.appendChild(title)
        container.appendChild(section)
        container.appendChild(createDivider())
    }

    Object.keys(gamesData).forEach(category => {
        if (category === "Uncategorized" || category === "Recently Played" || category === selectedCategory) return

        const title = document.createElement("h2")
        title.textContent = category

        const section = document.createElement("div")
        section.className = "games-section"

        gamesData[category].forEach(game => {
            const div = document.createElement("div")
            div.className = "game"
            div.innerHTML = `
                <img src="${game.image}">
                <a href="${game.href}">${game.title}</a>
            `
            section.appendChild(div)
        })

        container.appendChild(title)
        container.appendChild(section)
        container.appendChild(createDivider())
    })
}

function createDivider() {
    const d = document.createElement("div")
    d.className = "divider"
    return d
}

function displayRecent() {
    let recent = JSON.parse(localStorage.getItem("recentGames")) || []
    if (recent.length === 0) return

    const container = document.getElementById("games-container")
    const wrapper = document.createElement("div")

    wrapper.innerHTML = `
        <h2>Recently Played</h2>
        <div class="games-section" id="recent-section"></div>
        <div class="divider"></div>
    `
    container.appendChild(wrapper)

    const section = wrapper.querySelector("#recent-section")

    recent.forEach(game => {
        const div = document.createElement("div")
        div.className = "game"
        div.innerHTML = `
            <img src="${game.img}">
            <a href="${game.link}">${game.name}</a>
        `
        section.appendChild(div)
    })
}

function addToRecent(name, img, link) {
    if (link.includes("forms.gle")) return

    let recent = JSON.parse(localStorage.getItem("recentGames")) || []
    recent = recent.filter(g => g.name !== name)
    recent.unshift({ name, img, link })

    if (recent.length > 8) recent.pop()

    localStorage.setItem("recentGames", JSON.stringify(recent))
}

document.addEventListener("click", e => {
    const game = e.target.closest(".game")
    if (!game) return

    const link = game.querySelector("a")
    const img = game.querySelector("img")

    addToRecent(
        link.textContent.trim(),
        img.src,
        link.href
    )
})

document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase()
    document.querySelectorAll(".game").forEach(g => {
        const name = g.querySelector("a").textContent.toLowerCase()
        g.style.display = name.includes(q) ? "block" : "none"
    })
})

loadGames()
</script>
</body>
</html>
