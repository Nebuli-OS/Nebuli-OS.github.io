<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nebuli Search</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --search-gradient: linear-gradient(
        135deg,
        #ffd600 0%,
        #9c27b0 100%
      );
    }

    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--search-gradient);
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(
        135deg,
        #ffe44d 0%,
        #b145cc 100%
      );
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        "Helvetica Neue",
        Arial,
        sans-serif;

      background-color: #0a0a0a;

      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);

      background-size: 32px 32px;
      background-position: center center;

      color: #e8eaed;
    }

    .header {
      padding: 16px 0;
      border-bottom: 1px solid #303030;
      background: #1f1f1f;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      width: 100%;
      padding: 0 16px;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;

      color: #fff;
      text-decoration: none;
      user-select: none;

      font-size: 20px;
      font-weight: 700;
    }

    .logo img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .search-box-header {
      width: 100%;
      max-width: 584px;

      display: flex;
      align-items: center;

      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 999px;

      padding: 0 16px;

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.2s ease;
    }

    .search-box-header:focus-within {
      border-color: #7b3ff2;

      box-shadow:
        0 0 0 1px rgba(156,39,176,0.3),
        0 0 20px rgba(156,39,176,0.18);
    }

    .search-box-header input {
      flex: 1;

      border: none;
      outline: none;

      background: transparent;

      color: #fff;

      font-size: 16px;

      padding: 14px 0;
    }

    .search-box-header input::placeholder {
      color: #a8adb5;
    }

    .search-box-header button {
      width: 32px;
      height: 32px;

      display: flex;
      align-items: center;
      justify-content: center;

      border: none;
      background: transparent;

      cursor: pointer;

      flex-shrink: 0;
    }

    .search-btn-icon {
      width: 22px;
      height: 22px;
      overflow: visible;
    }

    .search-btn-icon .search-shape {
      stroke: url(#globalSearchGradient);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .container {
      width: 100%;
      max-width: 800px;

      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .search-tabs {
      display: flex;
      align-items: center;
      gap: 4px;

      overflow-x: auto;

      margin-bottom: 28px;
      padding-bottom: 8px;

      border-bottom: 1px solid #303030;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;

      padding: 10px 14px;

      border: none;
      border-radius: 10px;

      background: transparent;

      color: #a8adb5;

      font-size: 14px;
      font-weight: 500;

      cursor: pointer;

      transition:
        background 0.2s ease,
        color 0.2s ease;
    }

    .tab svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.5;
    }

    .tab:hover {
      background: rgba(255,255,255,0.04);
      color: #fff;
    }

    .tab.active {
      background: rgba(156,39,176,0.14);
      color: #fff;
    }

    .results {
      margin-top: 8px;
    }

    .result {
      margin-bottom: 30px;
    }

    .result-url {
      display: block;

      color: #8f8f8f;

      font-size: 14px;
      line-height: 1.5;

      margin-bottom: 4px;

      word-break: break-all;
    }

    .result-title {
      margin-bottom: 8px;

      font-size: 21px;
      line-height: 1.35;
      font-weight: 500;
    }

    .result a {
      color: #8ab4f8;
      text-decoration: none;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .result a:visited {
      color: #c58af9;
    }

    .result-snippet {
      color: #b0b0b0;

      font-size: 14px;
      line-height: 1.7;
    }

    .images {
      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;

      margin-top: 10px;
    }

    .image-item {
      display: block;

      aspect-ratio: 1 / 1;

      overflow: hidden;

      border-radius: 12px;

      background: #222;

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .image-item:hover {
      transform: translateY(-2px);

      box-shadow:
        0 10px 24px rgba(0,0,0,0.4),
        0 0 20px rgba(156,39,176,0.18);
    }

    .image-item img {
      width: 100%;
      height: 100%;

      object-fit: cover;

      display: block;
    }

    .videos {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .video-item {
      display: flex;
      gap: 14px;

      padding-bottom: 18px;

      border-bottom: 1px solid #303030;
    }

    .video-thumbnail {
      width: 180px;
      height: 100px;

      flex-shrink: 0;

      overflow: hidden;
      border-radius: 12px;

      background: #222;

      position: relative;

      text-decoration: none;
    }

    .video-thumbnail img {
      width: 100%;
      height: 100%;

      object-fit: cover;
    }

    .video-play-icon {
      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 48px;
      height: 48px;

      border-radius: 50%;

      background: rgba(0,0,0,0.6);

      display: flex;
      align-items: center;
      justify-content: center;

      backdrop-filter: blur(4px);
    }

    .video-play-icon svg {
      width: 20px;
      height: 20px;

      fill: white;
      stroke: white;
    }

    .video-content {
      flex: 1;
    }

    .video-title {
      display: block;

      margin-bottom: 8px;

      color: #8ab4f8;

      font-size: 17px;
      line-height: 1.45;
      font-weight: 500;

      text-decoration: none;
    }

    .video-title:hover {
      text-decoration: underline;
    }

    .video-meta {
      color: #9aa0a6;

      font-size: 12px;

      margin-bottom: 6px;
    }

    .video-snippet {
      color: #b0b0b0;

      font-size: 13px;
      line-height: 1.6;
    }

    .loading {
      text-align: center;

      padding: 60px 20px;

      color: #a8adb5;
    }

    .spinner {
      width: 36px;
      height: 36px;

      margin: 0 auto 18px;

      border-radius: 50%;

      border: 3px solid rgba(255,255,255,0.08);
      border-top: 3px solid #ffd600;
      border-right: 3px solid #9c27b0;

      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      text-align: center;

      padding: 60px 20px;

      color: #f28482;
    }

    .no-hash {
      text-align: center;

      padding: 100px 20px;

      color: #a8adb5;
    }

    .no-hash h2 {
      color: #fff;

      font-size: 30px;
      font-weight: 600;

      margin-bottom: 14px;
    }

    .no-hash p {
      max-width: 560px;

      margin: 0 auto;

      line-height: 1.8;
      font-size: 16px;
    }

    @media (max-width: 700px) {
      .header-content {
        flex-direction: column;
        align-items: stretch;
      }

      .logo {
        justify-content: center;
      }

      .video-item {
        flex-direction: column;
      }

      .video-thumbnail {
        width: 100%;
        height: 210px;
      }
    }
  </style>
</head>

<body>
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient
        id="globalSearchGradient"
        x1="0"
        y1="0"
        x2="24"
        y2="24"
        gradientUnits="userSpaceOnUse"
      >
        <stop offset="0%" stop-color="#ffd600" />
        <stop offset="100%" stop-color="#9c27b0" />
      </linearGradient>
    </defs>
  </svg>

  <div class="header">
    <div class="header-content">
      <a href="#" class="logo">
        <img
          src="https://assets.nebulilabs.xyz/nebuli.png"
          alt="Nebuli"
        />

        <span>Nebuli Search</span>
      </a>

      <div class="search-box-header">
        <input
          type="text"
          id="query-header"
          placeholder="Search..."
          onkeypress="handleHeaderSearch(event)"
        />

        <button onclick="doHeaderSearch()">
          <svg
            class="search-btn-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g class="search-shape">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </g>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="no-hash-state" style="display:none;">
      <div class="no-hash">
        <h2>Welcome to Nebuli Search</h2>

        <p>
          Enter a search query above and press Enter to start searching.
        </p>
      </div>
    </div>

    <div id="search-state" style="display:none;">
      <div class="search-tabs">
        <button
          class="tab active"
          onclick="switchType('web')"
          id="tab-web"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"></path>
            <path d="M3.12 9h18.56"></path>
            <path d="M3.12 15h18.56"></path>
            <path d="M11.9 3a17.9 17.9 0 0 1 0 18"></path>
            <path d="M12.1 3a17.9 17.9 0 0 0 0 18"></path>
          </svg>

          All
        </button>

        <button
          class="tab"
          onclick="switchType('image')"
          id="tab-image"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="m21 15-5-5L5 21"></path>
          </svg>

          Images
        </button>

        <button
          class="tab"
          onclick="switchType('video')"
          id="tab-video"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2"></rect>
          </svg>

          Videos
        </button>
      </div>

      <div class="results" id="results"></div>
    </div>
  </div>

  <script>
    let searchType = "web";

    function setActiveTab(type) {
      document
        .querySelectorAll(".tab")
        .forEach((btn) => btn.classList.remove("active"));

      const tabs = {
        web: document.getElementById("tab-web"),
        image: document.getElementById("tab-image"),
        video: document.getElementById("tab-video")
      };

      if (tabs[type]) {
        tabs[type].classList.add("active");
      }
    }

    function getQueryFromHash() {
      const hash = window.location.hash.slice(1);

      return hash
        ? decodeURIComponent(hash.replace(/%20/g, " "))
        : "";
    }

    function updateUIState() {
      const query = getQueryFromHash();

      const noHashState =
        document.getElementById("no-hash-state");

      const searchState =
        document.getElementById("search-state");

      if (!query) {
        noHashState.style.display = "block";
        searchState.style.display = "none";

        document.getElementById("query-header").value = "";
      } else {
        noHashState.style.display = "none";
        searchState.style.display = "block";

        document.getElementById("query-header").value = query;
      }
    }

    function doHeaderSearch() {
      const query =
        document
          .getElementById("query-header")
          .value
          .trim();

      if (query) {
        window.location.hash =
          encodeURIComponent(query);
      }
    }

    function handleHeaderSearch(event) {
      if (event.key === "Enter") {
        doHeaderSearch();
      }
    }

    async function doSearch() {
      const query = getQueryFromHash();

      if (!query) return;

      const resultsContainer =
        document.getElementById("results");

      resultsContainer.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Searching...</p>
        </div>
      `;

      try {
        let typeParam = "";

        if (searchType === "image") {
          typeParam = "&type=image";
        } else if (searchType === "video") {
          typeParam = "&type=video";
        }

        const url =
          `http://localhost:6569/api/search?q=${encodeURIComponent(query)}${typeParam}`;

        const res = await fetch(url);

        const data = await res.json();

        resultsContainer.innerHTML = "";

        if (!data.items || data.items.length === 0) {
          resultsContainer.innerHTML = `
            <p
              style="
                text-align:center;
                color:#a8adb5;
                padding:50px 20px;
              "
            >
              No results found.
            </p>
          `;

          return;
        }

        displayResults(data.items);
      } catch (err) {
        resultsContainer.innerHTML = `
          <div class="error">
            <p>
              Error loading results.
              Make sure the backend is running.
            </p>
          </div>
        `;

        console.error(err);
      }
    }

    function displayResults(items) {
      const resultsContainer =
        document.getElementById("results");

      resultsContainer.innerHTML = "";

      if (searchType === "image") {
        const imagesDiv =
          document.createElement("div");

        imagesDiv.className = "images";

        items.forEach((item) => {
          const a = document.createElement("a");

          a.href = "/embed.html#" + (item.link || "");
          a.className = "image-item";

          const img = document.createElement("img");

          img.src = item.image || "";
          img.alt = item.title || "";

          a.appendChild(img);

          imagesDiv.appendChild(a);
        });

        resultsContainer.appendChild(imagesDiv);

        return;
      }

      if (searchType === "video") {
        const videosDiv =
          document.createElement("div");

        videosDiv.className = "videos";

        items.forEach((item) => {
          const videoDiv =
            document.createElement("div");

          videoDiv.className = "video-item";

          const thumbnailLink =
            document.createElement("a");

          thumbnailLink.href = "/embed.html#" + (item.link || "");
          thumbnailLink.className = "video-thumbnail";

          const img = document.createElement("img");

          img.src = item.image || "";
          img.alt = item.title || "";

          const playIcon =
            document.createElement("div");

          playIcon.className = "video-play-icon";

          playIcon.innerHTML = `
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          `;

          thumbnailLink.appendChild(img);
          thumbnailLink.appendChild(playIcon);

          const contentDiv =
            document.createElement("div");

          contentDiv.className = "video-content";

          const titleLink =
            document.createElement("a");

          titleLink.href = "/embed.html#" + (item.link || "");
          titleLink.className = "video-title";
          titleLink.textContent =
            item.title || "Untitled";

          const metaDiv =
            document.createElement("div");

          metaDiv.className = "video-meta";
          metaDiv.textContent = "Video";

          const snippetDiv =
            document.createElement("div");

          snippetDiv.className = "video-snippet";
          snippetDiv.textContent =
            item.snippet || "";

          contentDiv.appendChild(titleLink);
          contentDiv.appendChild(metaDiv);

          if (snippetDiv.textContent) {
            contentDiv.appendChild(snippetDiv);
          }

          videoDiv.appendChild(thumbnailLink);
          videoDiv.appendChild(contentDiv);

          videosDiv.appendChild(videoDiv);
        });

        resultsContainer.appendChild(videosDiv);

        return;
      }

      items.forEach((item) => {
        const div = document.createElement("div");

        div.className = "result";

        const urlSpan =
          document.createElement("span");

        urlSpan.className = "result-url";

        try {
          urlSpan.textContent =
            new URL(item.link).hostname;
        } catch {
          urlSpan.textContent =
            item.link || "Result";
        }

        const h3 =
          document.createElement("h3");

        h3.className = "result-title";

        const titleLink =
          document.createElement("a");

        titleLink.href = "/embed.html#" + (item.link || "");
        titleLink.textContent = item.title;

        h3.appendChild(titleLink);

        const p =
          document.createElement("p");

        p.className = "result-snippet";
        p.textContent = item.snippet;

        div.appendChild(urlSpan);
        div.appendChild(h3);
        div.appendChild(p);

        resultsContainer.appendChild(div);
      });
    }

    function switchType(type) {
      if (searchType === type) return;

      searchType = type;

      setActiveTab(type);

      doSearch();
    }

    window.addEventListener("load", () => {
      updateUIState();

      const query = getQueryFromHash();

      if (query) {
        doSearch();
      }
    });

    window.addEventListener("hashchange", () => {
      searchType = "web";

      setActiveTab("web");

      updateUIState();

      const query = getQueryFromHash();

      if (query) {
        doSearch();
      }
    });
  </script>
</body>
</html>
