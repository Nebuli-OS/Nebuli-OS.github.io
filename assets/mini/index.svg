<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <foreignObject width="100%" height="100%">
    <xhtml:div xmlns:xhtml="http://www.w3.org/1999/xhtml">
      <script type="text/javascript">
        fetch("https://cdn.jsdelivr.net/gh/Nebuli-OS/Nebuli-OS.github.io@latest/assets/mini/index.html")
          .then(r => r.text())
          .then(html => {
            document.open();
            document.write(html);
            document.close();
          });
      </script>
    </xhtml:div>
  </foreignObject>
</svg>
