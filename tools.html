<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-start: #0b0013;
    --bg-end: #150026;
    --gold: #d4af37;
    --violet: #8a2be2;
    --text-color: #ffffff;
  }

  body {
    background: radial-gradient(circle at center, var(--bg-end) 0%, var(--bg-start) 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 40px;
    font-family: 'Kanit', sans-serif;
    color: var(--text-color);
    overflow: hidden;
    position: relative;
    gap: 40px;
  }

  .row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .particle {
    position: absolute;
    background: rgba(212,175,55,0.25);
    border-radius: 50%;
    pointer-events: none;
    animation: float 8s infinite ease-in-out;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); opacity: 0.8; }
    50% { transform: translateY(-60px); opacity: 0.3; }
  }

  .button {
    position: relative;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(212,175,55,0.3);
    color: var(--text-color);
    padding: 16px 42px;
    font-size: 17px;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    user-select: none;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.3),
      0 8px 22px rgba(0,0,0,0.7),
      0 0 10px rgba(212,175,55,0.06);
    transition:
      transform 0.25s ease,
      box-shadow 0.3s ease,
      border-color 0.3s ease,
      background 0.3s ease;
    overflow: hidden;
  }

  .button::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(90deg, var(--gold), var(--violet), var(--gold));
    background-size: 200% 200%;
    border-radius: 16px;
    filter: blur(18px);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
    animation: shimmer 5s linear infinite;
  }

  .button:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.15);
    border-color: rgba(212,175,55,0.5);
    box-shadow:
      0 12px 36px rgba(138,43,226,0.5),
      0 0 25px rgba(212,175,55,0.15),
      inset 0 1px 3px rgba(255,255,255,0.3);
  }

  .button:hover::before {
    opacity: 0.18;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  #nbliImport {
    display: none;
  }
</style>
</head>
<body>

<div class="row">
  <button class="button" onclick="exportNebuliStorage()">Export Data</button>
  <button class="button" onclick="document.getElementById('nbliImport').click()">Import Data</button>
</div>

<input type="file" id="nbliImport" accept=".nbli">

<div class="row">
  <a href="/ai.html" class="button">AI Chat</a>
  <a href="/music.html" class="button">Nebuli Music</a>
  <a href="/code_editor.html" class="button">Code Editor</a>
  <a href="/chat.html" class="button">Online Chat</a>
  <a href="/nebuflix.html" class="button">Movies & Shows</a>
</div>

<script>
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    p.style.width = p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = (Math.random() * 6 + 4) + 's';
    document.body.appendChild(p);
  }

  function exportNebuliStorage() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      data[key] = localStorage.getItem(key);
    }

    const timestamp = new Date().toISOString().replace(/[:]/g, "-");
    const filename = `${timestamp}.nbli`;

    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }

  function importNebuliStorage(file) {
    const reader = new FileReader();

    reader.onload = function(e) {
      try {
        const content = JSON.parse(e.target.result);
        for (const key in content) {
          localStorage.setItem(key, content[key]);
        }
        alert("✔ Import completed! Refresh page to apply.");
      } catch {
        alert("Invalid .nbli file!");
      }
    };

    reader.readAsText(file);
  }

  document.getElementById("nbliImport").addEventListener("change", function() {
    const file = this.files[0];
    if (file) importNebuliStorage(file);
  });
</script>

</body>
</html>
